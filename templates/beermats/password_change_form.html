{% extends 'beermats/base.html' %}

{% block title %}Change password – Beermat Collector{% endblock %}

{% block content %}
  <h1>Change password</h1>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Change password</button>
    <a href="{% url 'profile' %}" class="btn btn-link">Cancel</a>
  </form>
{% endblock %}
